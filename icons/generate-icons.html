<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<canvas id="c" width="512" height="512"></canvas>
<script>
const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function drawIcon(size) {
  canvas.width = size;
  canvas.height = size;
  const s = size;
  const r = s * 0.18;

  // Background rounded rect
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(s - r, 0);
  ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r);
  ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s);
  ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();

  const grad = ctx.createLinearGradient(0, 0, s, s);
  grad.addColorStop(0, '#4F46E5');
  grad.addColorStop(1, '#3730A3');
  ctx.fillStyle = grad;
  ctx.fill();

  // Dollar/coin circle
  ctx.beginPath();
  ctx.arc(s * 0.5, s * 0.42, s * 0.22, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fill();

  // PB text
  ctx.fillStyle = '#FFFFFF';
  ctx.font = `bold ${s * 0.28}px Inter, system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('PB', s * 0.5, s * 0.43);

  // "penny buddy" small text
  ctx.font = `600 ${s * 0.08}px Inter, system-ui, sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.fillText('PENNY BUDDY', s * 0.5, s * 0.75);

  // Small coin accent
  ctx.beginPath();
  ctx.arc(s * 0.75, s * 0.25, s * 0.08, 0, Math.PI * 2);
  ctx.fillStyle = '#F59E0B';
  ctx.fill();
  ctx.fillStyle = '#FFFFFF';
  ctx.font = `bold ${s * 0.08}px Inter, system-ui, sans-serif`;
  ctx.fillText('$', s * 0.75, s * 0.26);

  return canvas.toDataURL('image/png');
}

// Generate and download all sizes
sizes.forEach(size => {
  const dataUrl = drawIcon(size);
  const a = document.createElement('a');
  a.href = dataUrl;
  a.download = `icon-${size}x${size}.png`;
  a.click();
});

document.body.innerHTML = '<h1>Icons generated! Check your downloads folder.</h1><p>Move the downloaded icons to the icons/ folder.</p>';
</script>
</body>
</html>
