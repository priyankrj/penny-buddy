services:
  - type: web
    name: penny-buddy
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: RENDER_DISK_PATH
        value: "/data"
      - key: RENDER
        value: "true"
    disk:
      name: pennybuddy-data
      mountPath: /data
      sizeGB: 1
